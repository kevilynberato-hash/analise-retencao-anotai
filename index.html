function buildProj(){var pg=document.getElementById('pg-proj'),h='';h+=ins2(INS.proj);h+=ins2('Media Ativados 5pdd/Mes = media realizado Jan a Mai/26.');var all=D.proj.cohort;var inb=all.filter(function(r){return r.grupo==='Ativacao Inbound'}).sort(function(a,b){return b.total_novos-a.total_novos});var cap=all.filter(function(r){return r.grupo==='Captacao'}).sort(function(a,b){return b.total_novos-a.total_novos});var out=all.filter(function(r){return r.grupo==='Outros'&&r.total_novos>=5}).sort(function(a,b){return b.total_novos-a.total_novos});h+='<div class="block"><div class="bt"><span class="badge bi">Ativacao Inbound</span></div><div class="cb" style="height:280px"><canvas id="pL"></canvas></div>';var gA={},cA={},sA={};inb.forEach(function(r){var g=r.gerente_ativ||'X',c=r.coord_ativ||'X',s=r.super_ativ||'X';if(!gA[g])gA[g]={gerente:g};if(!cA[g+'|'+c])cA[g+'|'+c]={gerente:g,coordenacao:c};if(!sA[c+'|'+s])sA[c+'|'+s]={coordenacao:c,supervisao:s};PS.forEach(function(p){gA[g]['retidos_'+p]=(gA[g]['retidos_'+p]||0)+(r['retidos_'+p]||0);gA[g]['novos_'+p]=(gA[g]['novos_'+p]||0)+(r['novos_'+p]||0);cA[g+'|'+c]['retidos_'+p]=(cA[g+'|'+c]['retidos_'+p]||0)+(r['retidos_'+p]||0);cA[g+'|'+c]['novos_'+p]=(cA[g+'|'+c]['novos_'+p]||0)+(r['novos_'+p]||0);sA[c+'|'+s]['retidos_'+p]=(sA[c+'|'+s]['retidos_'+p]||0)+(r['retidos_'+p]||0);sA[c+'|'+s]['novos_'+p]=(sA[c+'|'+s]['novos_'+p]||0)+(r['novos_'+p]||0)})});function cP(o){var l=[];for(var k in o){var x=o[k];PS.forEach(function(p){x['pct_'+p]=x['novos_'+p]>0?Math.round(x['retidos_'+p]/x['novos_'+p]*1000)/10:0});l.push(x)};return l}h+=cTbl(cP(gA),[{key:'gerente',label:'Gerente'}]);h+=ins2('Francieli ~32 exec vs Kleber ~17.');h+=cTbl(cP(cA),[{key:'gerente',label:'Ger.'},{key:'coordenacao',label:'Coord.'}]);h+=ins2('Time Amanda atua no canal Vitrine - desafio maior em ativacao e retencao.');h+=cTbl(cP(sA),[{key:'coordenacao',label:'Coord.'},{key:'supervisao',label:'Super.'}]);h+=ins2('Evolucao Retencao M1 mensal (Dez/25 a Abr/26) - Ati
