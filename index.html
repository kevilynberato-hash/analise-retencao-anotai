canvas id="cE'+t+'"></canvas></div><div class="tw"><table><tr><th>Executivo</th><th>Area</th><th>Gerente</th><th>Supervisor</th><th>Status</th>';PS.forEach(function(p){h+='<th class="c">Novos '+p+'</th><th class="c">Ret% '+p+'</th>'});h+='<th class="c">Queda</th></tr>';rw.forEach(function(r){h+='<tr><td class="n">'+r.executivo+'</td><td>'+r.times+'</td><td>'+r.gerente+'</td><td>'+r.supervisao+'</td><td>'+(r.rampagem||'-')+'</td>';PS.forEach(function(p){var n=r['novos_'+p]||0,pc=r['pct_'+p]||0;if(n===0)h+='<td class="r gray">-</td><td class="p gray">-</td>';else h+='<td class="r">'+fm(n)+'</td><td class="p '+hc(pc)+'">'+pc+'%</td>'});var m1=r.pct_M1||0,m12=r.pct_M12||0;h+=m1>0?'<td class="p h5">-'+(m1-m12).toFixed(1)+'pp</td>':'<td class="p gray">-</td>';h+='</tr>'});h+='</table></div></div>'});pg.innerHTML=h;mkBar('cG',D.cohort.gerente.map(function(r){return r.gerente}),PS.map(function(p,i){return{label:p,data:D.cohort.gerente.map(function(r){return r['pct_'+p]}),backgroundColor:CL[i],borderRadius:4}}),'% Retencao por Gerente');mkBar('cC',D.cohort.coordenador.map(function(r){return r.coordenacao}),PS.map(function(p,i){return{label:p,data:D.cohort.coordenador.map(function(r){return r['pct_'+p]}),backgroundColor:CL[i],borderRadius:4}}),'% Retencao por Coordenador');var sc=sd.filter(function(r){return r.supervisao!=='Sem Super'});mkBar('cS',sc.map(function(r){return r.supervisao}),PS.map(function(p,i){return{label:p,data:sc.map(function(r){return r['pct_'+p]}),backgroundColor:CL[i],borderRadius:4}}),'% Retencao por Supervisor');['Captacao','Crossell','Regionais'].forEach(function(t){if(!eg[t])return;mkLine('cE'+t,eg[t],'Curva Retencao - '+t)})}
function buildAtiva(){var pg=document.getElementById('pg-ativa'),h='',gD=D.ativa.gerente,cD=D.ativa.coordenador,sD=D.ativa.supervisor;h+='<div style="background:#fff3e0;border-left:4px solid #e17055;padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:16px;font-size:12px"><strong>Disclaimer:</strong> Os dados de base ativa referem-se apenas aos executivos ativos no time no periodo. Contas de origem Self aparecem em linha separada. Contas vinculadas a executivos que sairam do time estao na linha Inativos.</div>';h+='<div class="block"><div class="bt">Base Ativa por Gerente<span class="bs">Mensal - '+fm(D.ativa.total_base)+' merchants total | '+fm(D.ativa.total_mapped)+' comercial ativo | '+fm(D.ativa.total_self)+' self | '+fm(D.ativa.total_inativo)+' inativos</span></div><div class="cb"><canvas id="aG"></canvas></div>'+mTbl(gD,['Gerente'],['Gerente'])+'</div><hr class="sep">';h+='<div class="block"><div class="bt">Base Ativa por Coordenador<span class="bs">Mensal - apenas comercial ativo</span></div><div class="cb"><canvas id="aC"></canvas></div>'+mTbl(cD,['Gerente','Coordenacao'],['Gerente','Coordenador'])+'</div><hr class="sep">';h+='<div class="block"><div class="bt">Base Ativa por Supervisor<span class="bs">Mensal</span></div><div class="cb"><canvas id="aS"></canvas></div>'+mTbl(sD,['Gerente','Coordenacao','Supervisao'],['Gerente','Coord.','Supervisor'])+'</div><hr class="sep">';var eG={};D.ativa.executivo.forEach(function(d){if(!eG[d.Times])eG[d.Times]=[];eG[d.Times].push(d)});['Captacao','Crossell','Regionais'].forEach(function(t){if(!eG[t])return;var rw=eG[t];rw.sort(function(a,b){return b.total-a.total});var bd=t==='Crossell'?'bx':t==='Regionais'?'breg':'bc';h+='<div class="block"><div class="bt"><span class="badge '+bd+'">'+t+'</span> Executivos<span class="bs">'+rw.length+' pessoas</span></div><div class="cb" style="height:'+Math.max(rw.length*22+60,180)+'px"><canvas id="aE'+t+'"></canvas></div>'+mTbl(rw,['HC','Coordenacao','Supervisao'],['Executivo','Coord.','Supervisor'])+'</div>'});pg.innerHTML=h;var gC=gD.filter(function(r){return r.Gerente!=='Inativos'});mkBarVol('aG',MS,gC.map(function(r,i){return{label:r.Gerente,data:MS.map(function(m){return r[m]||0}),backgroundColor:r.Gerente==='Self'?'#fdcb6e':CL[i],borderRadius:4}}),'Base Ativa Mensal por Gerente (sem Inativos)');mkBarVol('aC',MS,cD.map(function(r,i){return{label:r.Coordenacao,data:MS.map(function(m){return r[m]||0}),backgroundColor:CL[i],borderRadius:4}}),'Base Ativa Mensal por Coordenador');var sC=sD.filter(function(r){return r.Supervisao!=='Sem Super'});mkBarVol('aS',MS,sC.map(function(r,i){return{label:r.Supervisao,data:MS.map(function(m){return r[m]||0}),backgroundColor:CL[i%16],borderRadius:4}}),'Base Ativa Mensal por Supervisor');['Captacao','Crossell','Regionais'].forEach(function(t){if(!eG[t])return;var tp=eG[t].slice(0,15);mkBarH('aE'+t,tp.map(function(r){return r.HC}),MS.map(function(m,i){return{label:m,data:tp.map(function(r){return r[m]||0}),backgroundColor:CL[i],borderRadius:3}}),'Base Ativa - '+t+' (Top 15)')})}
function buildProj(){var pg=document.getElementById('pg-proj'),h='';var all=D.proj.cohort;var inb=all.filter(function(r){return r.grupo==='Ativacao Inbound'}).sort(function(a,b){return b.total_novos-a.total_novos});var cap=all.filter(function(r){return r.grupo==='Captacao'}).sort(function(a,b){return b.total_novos-a.total_novos});var out=all.filter(function(r){return r.grupo==='Outros'&&r.total_novos>=5}).sort(function(a,b){return b.total_novos-a.total_novos});h+='<div class="block"><div class="bt"><span class="badge bi">Ativacao Inbound</span><span class="bs">'+inb.length+' responsaveis</span></div><div class="cb" style="height:320px"><canvas id="pL"></canvas></div>';var gA={},cA={},sA={};inb.forEach(function(r){var g=r.gerente_ativ||'Outros',c=r.coord_ativ||'Outros',s=r.super_ativ||'Outros';if(!gA[g])gA[g]={gerente:g};if(!cA[g+'|'+c])cA[g+'|'+c]={gerente:g,coordenacao:c};if(!sA[c+'|'+s])sA[c+'|'+s]={coordenacao:c,supervisao:s};PS.forEach(function(p){gA[g]['novos_'+p]=(gA[g]['novos_'+p]||0)+(r['novos_'+p]||0);gA[g]['retidos_'+p]=(gA[g]['retidos_'+p]||0)+(r['retidos_'+p]||0);cA[g+'|'+c]['novos_'+p]=(cA[g+'|'+c]['novos_'+p]||0)+(r['novos_'+p]||0);cA[g+'|'+c]['retidos_'+p]=(cA[g+'|'+c]['retidos_'+p]||0)+(r['retidos_'+p]||0);sA[c+'|'+s]['novos_'+p]=(sA[c+'|'+s]['novos_'+p]||0)+(r['novos_'+p]||0);sA[c+'|'+s]['retidos_'+p]=(sA[c+'|'+s]['retidos_'+p]||0)+(r['retidos_'+p]||0)})});function calcP(obj){var l=[];for(var k in obj){var o=obj[k];PS.forEach(function(p){o['pct_'+p]=o['novos_'+p]>0?Math.round(o['retidos_'+p]/o['novos_'+p]*1000)/10:0});l.push(o)};return l}h+=cTbl(calcP(gA),[{key:'gerente',label:'Gerente Ativacao'}]);h+=cTbl(calcP(cA),[{key:'gerente',label:'Gerente'},{key:'coordenacao',label:'Coord. Ativacao'}]);h+=cTbl(calcP(sA),[{key:'coordenacao',label:'Coord.'},{key:'supervisao',label:'Super. Ativacao'}]);h+=cTbl(inb,[{key:'prn',label:'Responsavel'},{key:'coord_ativ',label:'Coord.'},{key:'super_ativ',label:'Super.'}]);h+='</div>';if(cap.length>0){h+='<hr class="se
